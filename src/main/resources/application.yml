spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vacancy_tracker
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: vacancy-tracker-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: org.example.dto

  data:
    redis:
      host: localhost
      port: 6379

  # AI конфигурация - ЗАКОММЕНТИРОВАНО для первого запуска
  # Раскомментируйте когда получите OpenAI API ключ
  # ai:
  #   openai:
  #     api-key: ${OPENAI_API_KEY}
  #     model: gpt-4o-mini
  #     timeout: 60s
  #     max-retries: 2

# Названия Kafka топиков
kafka:
  topics:
    vacancy-raw: vacancy.raw
    vacancy-processed: vacancy.processed
    vacancy-failed: vacancy.failed